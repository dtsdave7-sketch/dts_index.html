<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="productTitle">Product | DTS</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav>
<div class="nav-left">
<img src="images/dts-logo.png" alt="DTS Logo">
</div>

<div class="nav-right">
<ul>
<li><a href="index.html">Accueil</a></li>
<li><a href="store.html">Store</a></li>
<li><a href="checkout.html">Checkout</a></li>
  <div class="cart-icon">
🛒<span class="cart-count">0</span>
</div>
</ul>

</div>
</nav>
  <div id="cart-panel" class="cart-panel">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<div class="cart-total">
Total: $<span id="cart-total">0</span>
</div>

<a href="checkout.html" class="btn checkout-btn">Checkout</a>

</div>

<!-- PRODUCT DETAIL -->
<section class="product-detail">

<div class="product-container">

<div class="product-gallery">
<img id="detailImg" src="" alt="Product Image">
</div>

<div class="product-info">
<h1 id="detailName">Product Name</h1>
<p class="price" id="detailPrice">$0</p>

<p class="description" id="detailDesc">
Product description here.
</p>

<button class="btn add-to-cart" 
id="detailAddToCart"
data-name="" data-price="" data-img="">
Add to Cart
</button>

<br><br>

<a id="whatsappBtn" class="btn" href="" target="_blank">
Commander via WhatsApp
</a>

</div>

</div>
</section>

<!-- FOOTER -->
<footer>
<div class="footer-bottom">
© 2026 Dave Tech Services. All rights reserved.
</div>

</footer>

<script>

const cartIcon = document.querySelector(".cart-icon");
const cartPanel = document.getElementById("cart-panel");
const cartItemsContainer = document.getElementById("cart-items");
const cartTotal = document.getElementById("cart-total");

cartIcon.addEventListener("click", () => {
cartPanel.classList.toggle("open");
renderCart();
});

function renderCart(){

let cart = getCart();
cartItemsContainer.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

total += item.price;

cartItemsContainer.innerHTML += `
<div class="cart-item">

<img src="${item.img}" width="50">

<div>
<h4>${item.name}</h4>
<p>$${item.price}</p>
<button onclick="removeItem(${index})">Remove</button>
</div>

</div>
`;

});

cartTotal.textContent = total;

}

function removeItem(index){

let cart = getCart();

cart.splice(index,1);

saveCart(cart);

renderCart();

updateCartCount();

}

</script>

</body>
</html>
