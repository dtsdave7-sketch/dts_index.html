<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="productTitle">Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-detail">

<img id="detailImg" width="300">

<h1 id="detailName"></h1>

<p id="detailPrice"></p>

<button id="addCart">Add to Cart</button>

<a id="whatsappBtn" target="_blank">
Commander sur WhatsApp
</a>

</div>


<script>

const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const price = params.get("price");
const img = params.get("img");

document.getElementById("detailName").textContent = name;
document.getElementById("detailPrice").textContent = "$" + price;
document.getElementById("detailImg").src = img;

document.getElementById("productTitle").textContent = name;

document.getElementById("whatsappBtn").href =
"https://wa.me/50946126417?text=Bonjour je veux commander " + name;


function getCart(){
return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
localStorage.setItem("cart", JSON.stringify(cart));
}

document.getElementById("addCart").addEventListener("click", function(){

let cart = getCart();

cart.push({
name:name,
price:price,
img:img
});

saveCart(cart);

alert("Product added to cart");

});

</script>

</body>
</html>
