<script>

// GET PRODUCT FROM URL
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const price = params.get("price");
const img = params.get("img");

// DISPLAY PRODUCT
if(name){

document.getElementById("detailName").textContent = name;
document.getElementById("detailPrice").textContent = "$" + price;
document.getElementById("detailImg").src = img;

document.getElementById("productTitle").textContent = name + " | DTS";

const cartBtn = document.getElementById("detailAddToCart");

cartBtn.dataset.name = name;
cartBtn.dataset.price = price;
cartBtn.dataset.img = img;

// WHATSAPP BUTTON
const whatsapp = document.getElementById("whatsappBtn");

whatsapp.href =
"https://wa.me/50946126417?text=Bonjour je veux commander " + name;

}

// CART FUNCTIONS
function getCart(){
return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCartCount(){
const cart = getCart();
document.querySelector(".cart-count").textContent = cart.length;
}

// ADD TO CART
document.getElementById("detailAddToCart").addEventListener("click", function(){

const name = this.dataset.name;
const price = parseFloat(this.dataset.price);
const img = this.dataset.img;

let cart = getCart();

cart.push({name,price,img});

saveCart(cart);

updateCartCount();

alert(name + " added to cart");

});

// CART PANEL
const cartIcon = document.querySelector(".cart-icon");
const cartPanel = document.getElementById("cart-panel");
const cartItemsContainer = document.getElementById("cart-items");
const cartTotal = document.getElementById("cart-total");

cartIcon.addEventListener("click", () => {

cartPanel.classList.toggle("open");

renderCart();

});

function renderCart(){

let cart = getCart();

cartItemsContainer.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

total += item.price;

cartItemsContainer.innerHTML += `
<div class="cart-item">

<img src="${item.img}" width="50">

<div>

<h4>${item.name}</h4>

<p>$${item.price}</p>

<button onclick="removeItem(${index})">Remove</button>

</div>

</div>
`;

});

cartTotal.textContent = total;

}

function removeItem(index){

let cart = getCart();

cart.splice(index,1);

saveCart(cart);

renderCart();

updateCartCount();

}

updateCartCount();

</script>
